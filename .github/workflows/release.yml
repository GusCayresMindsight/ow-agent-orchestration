name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Publish and release
    runs-on: ubuntu-latest
    environment: stable

    permissions:
      contents: write   # create GitHub Release and upload assets
      id-token: write   # PyPI trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Build Python package
        run: uv build

      - name: Install dependencies
        run: bun install

      - name: Run TypeScript BDD tests
        run: bun x cucumber-js

      - name: Run Python BDD tests
        run: uv run --with behave behave features/ --tags=@behave

      - name: Build opencode binary (linux-x64)
        working-directory: opencode/packages/opencode
        run: bun run script/build.ts --single --skip-install

      - name: Package opencode binary
        working-directory: opencode/packages/opencode
        run: tar -czf opencode-linux-x64.tar.gz -C dist/opencode-linux-x64/bin opencode

      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release and upload assets
        run: |
          cp scripts/install.sh install
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "$(cat <<'EOF'
          ## Install

          ```bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install | bash
          ```

          This installs:
          - `ow` to `~/.local/bin/ow` (via uv)
          - the bundled opencode binary to `~/.local/share/ow/bin/opencode`
          EOF
          )" \
            install \
            opencode/packages/opencode/opencode-linux-x64.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
